<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pankaj Digital Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#020024,#090979,#000);
color:white;
overflow-x:hidden;
}

/* glowing background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://cdn.jsdelivr.net/gh/JulianLaval/canvas-particle-network/particle.png");
opacity:0.15;
z-index:-1;
}

/* header */
header{
background:#000000aa;
padding:20px;
text-align:center;
font-size:28px;
color:#00ffff;
box-shadow:0 0 20px cyan;
}

/* products grid */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
}

/* product card */
.card{
background:#111827;
border-radius:20px;
padding:25px;
text-align:center;
transition:0.4s;
box-shadow:0 0 15px #00ffff44;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 35px #00ffff;
}

.icon{
font-size:70px;
}

.price{
font-size:22px;
color:#00ffff;
margin:10px;
}

button{
background:#00ffff;
border:none;
padding:15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
width:90%;
}

button:hover{
background:#00bcd4;
}

/* AI helper */
#ai{
position:fixed;
bottom:20px;
right:20px;
background:#111;
padding:15px;
border-radius:15px;
box-shadow:0 0 20px cyan;
width:220px;
}

/* contact */
.contact{
text-align:center;
padding:30px;
background:#000;
}
</style>
</head>

<body>

<header>
🚀 Pankaj Kumar Ratrey Digital Store
</header>

<div class="products">

<div class="card">
<div class="icon">🎮</div>
<h2>Free Fire Panels</h2>
<div class="price">₹30</div>
<button onclick="pay('Free Fire Panels',30,'panels.zip')">
Buy via PhonePe
</button>
</div>

<div class="card">
<div class="icon">🌐</div>
<h2>VPN Files</h2>
<div class="price">₹7</div>
<button onclick="pay('VPN Files',7,'free_vpn.zip')">
Buy via PhonePe
</button>
</div>

<div class="card">
<div class="icon">📘</div>
<h2>ITI Questions</h2>
<div class="price">₹20</div>
<button onclick="pay('ITI Questions',20,'iti_questions.zip')">
Buy via PhonePe
</button>
</div>

<div class="card">
<div class="icon">🧰</div>
<h2>Tools Pack</h2>
<div class="price">₹30</div>
<button onclick="pay('Tools Pack',30,'tools.zip')">
Buy via PhonePe
</button>
</div>

</div>

<!-- AI Helper -->
<div id="ai">
🤖 <b>AI Help</b><br>
Click Buy → Pay → Press “I Paid” → Download starts.
</div>

<div class="contact">
📧 Support: cgpolishkorba@gmail.com
</div>

<script>
function pay(product,price,file){

// open PhonePe UPI with amount
let upi="upi://pay?pa=pankajratrey7@axl&pn=PankajStore&am="+price+"&cu=INR";

window.location.href=upi;

// after payment confirmation
setTimeout(()=>{
if(confirm("Did you complete payment for "+product+" ?")){
window.location.href=file;
}
},8000);

}
</script>

</body>
</html>
